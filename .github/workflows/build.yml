name: CI

on:
  push:
    branches:
      - main
      - ci/*
      - merge/*
  pull_request:
      branches:
        - main

env:
  GAME_REVISION: 0
  GAME_LANGUAGE: ENGLISH
  COMPARE: 0
  UNUSED_ERROR: 1
  DEPRECATED_ERROR: 1

jobs:
  emerald:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: ROM (Emerald)
        env:
          GAME_VERSION: EMERALD
        run: make -j$(nproc) -O all

  emerald-debug:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Debug (Emerald)
        env:
          GAME_VERSION: EMERALD
        run: make debug -j$(nproc) -O all

  emerald-release:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Release (Emerald)
        env:
          GAME_VERSION: EMERALD
        run: make -j$(nproc) release

  test:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Test
        env:
          GAME_VERSION: EMERALD
          TEST: 1
        run: make -j$(nproc) check

  # Gate job: satisfies the "build" branch protection rule.
  # Passes only when all parallel build/test jobs succeed.
  build:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: [emerald, emerald-debug, emerald-release, test]
    steps:
      - name: All builds passed
        run: echo "All builds and tests passed."
